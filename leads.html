<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Terraflow · Leads</title>
<style>
 :root{--onyx:#0A0A0A;--moon:#FAFAFA;--ocean:#0099FF;--gold:#F5B53D;--green:#34D399;--red:#F87171;
   --mut:#8a8a8a;--line:#1e1e1e;--card:#141414;--card2:#1a1a1a;--hover:#181818;}
 *{box-sizing:border-box}
 body{margin:0;background:var(--onyx);color:var(--moon);font-family:'Lexend',-apple-system,Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased;font-size:13.5px}
 a{color:var(--ocean);text-decoration:none}
 header{position:sticky;top:0;z-index:20;background:rgba(10,10,10,.96);backdrop-filter:blur(8px);
   border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
 .nav{display:flex;gap:4px}
 .nav a{padding:6px 12px;border-radius:8px;color:var(--mut);font-weight:500}
 .nav a.on{background:var(--card2);color:var(--moon)}
 header .sp{flex:1}
 button{font-family:inherit;background:var(--card2);color:var(--moon);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
 button:active{transform:scale(.97)}
 .bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid var(--line)}
 .bar input.search{background:var(--card);border:1px solid var(--line);border-radius:9px;color:var(--moon);padding:8px 12px;font-family:inherit;font-size:13px;min-width:180px;flex:1;max-width:320px}
 .chips{display:flex;gap:5px;flex-wrap:wrap}
 .chip{padding:5px 10px;border-radius:20px;border:1px solid var(--line);background:var(--card);color:var(--mut);font-size:12px;cursor:pointer;user-select:none}
 .chip.on{background:var(--ocean);border-color:var(--ocean);color:#fff}
 .count{color:var(--mut);font-size:12px;margin-left:auto}
 /* table */
 .tablewrap{overflow-x:auto}
 table{width:100%;border-collapse:collapse}
 th,td{text-align:left;padding:10px 14px;border-bottom:1px solid var(--line);white-space:nowrap}
 th{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);position:sticky;top:0;background:var(--onyx);cursor:pointer}
 tbody tr{cursor:pointer}
 tbody tr:hover{background:var(--hover)}
 tbody tr.sel{background:#12233a}
 .nm{font-weight:600}
 .sub{color:var(--mut);font-size:11.5px}
 .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
 .dot{display:inline-block;width:8px;height:8px;border-radius:50%}
 /* drawer */
 #ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:30;display:none}
 #drawer{position:fixed;top:0;right:0;height:100%;width:390px;max-width:100%;background:#0d0d0d;border-left:1px solid var(--line);
   z-index:31;transform:translateX(100%);transition:transform .18s ease;overflow-y:auto;padding:18px}
 #drawer.open{transform:translateX(0)}
 .dhead{display:flex;align-items:flex-start;gap:10px}
 .dhead .x{margin-left:auto;cursor:pointer;color:var(--mut);font-size:20px;line-height:1}
 .dname{font-size:19px;font-weight:700}
 .dmeta{color:var(--mut);font-size:12px;margin-top:2px}
 .actions{display:flex;gap:8px;margin:14px 0}
 .actions a,.actions button{flex:1;text-align:center;padding:9px;border-radius:9px;font-size:12.5px;font-weight:600;border:1px solid var(--line)}
 .actions .wa{background:#25D366;color:#062e13;border:none}
 .actions .em{background:var(--card2);color:var(--moon)}
 .field{margin:14px 0}
 .field label{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);display:block;margin-bottom:6px}
 .field select,.field textarea{width:100%;background:var(--onyx);color:var(--moon);border:1px solid var(--line);border-radius:8px;padding:9px;font-family:inherit;font-size:13px}
 .contact{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12.5px;line-height:1.9}
 .contact .cp{color:var(--mut);cursor:pointer;float:right;font-size:11px}
 .tl{margin-top:8px;border-left:2px solid var(--line);padding-left:14px}
 .tl .ev{position:relative;padding:8px 0}
 .tl .ev::before{content:"";position:absolute;left:-19px;top:12px;width:8px;height:8px;border-radius:50%;background:var(--ocean)}
 .tl .ty{font-size:12.5px;font-weight:600}
 .tl .no{font-size:12.5px;color:#cfcfcf;margin-top:2px}
 .tl .wh{font-size:10.5px;color:#666;margin-top:2px}
 .savebtn{background:var(--ocean);border:none;color:#fff;width:100%;padding:9px;border-radius:8px;font-weight:600;margin-top:8px}
 /* login */
 #gate{position:fixed;inset:0;background:var(--onyx);display:flex;align-items:center;justify-content:center;z-index:50}
 #gate .box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px;width:300px;text-align:center}
 #gate input{width:100%;margin:14px 0;padding:11px;border-radius:8px;border:1px solid var(--line);background:var(--onyx);color:var(--moon);font-family:inherit}
 #gate button{width:100%;background:var(--ocean);border:none;padding:11px;font-weight:600}
 .err{color:var(--red);font-size:12px;min-height:16px}
 @media(max-width:640px){ th.hide,td.hide{display:none} }
</style></head>
<body>
<div id="gate"><div class="box">
  <div style="font-weight:700;letter-spacing:.4px">Terraflow Leads</div>
  <input id="pw" type="password" placeholder="Access password" autocomplete="current-password">
  <div class="err" id="gerr"></div>
  <button onclick="login()">Enter</button>
</div></div>

<header>
  <div class="nav"><a href="./index.html">Overview</a><a href="./leads.html" class="on">Leads</a></div>
  <span class="sp"></span>
  <button onclick="load()">Refresh</button>
  <button onclick="logout()">Lock</button>
</header>

<div class="bar" id="bar" style="display:none">
  <input class="search" id="search" placeholder="Search name or ad…" oninput="render()">
  <div class="chips" id="stageChips"></div>
  <div class="chips" id="intChips"></div>
  <span class="count" id="count"></span>
</div>

<div class="tablewrap" id="tablewrap" style="display:none">
  <table>
    <thead><tr>
      <th onclick="sortBy('name')">Lead</th>
      <th class="hide" onclick="sortBy('ad')">Ad</th>
      <th onclick="sortBy('stage')">Stage</th>
      <th onclick="sortBy('interest')">Interest</th>
      <th class="hide">Replied</th>
      <th class="hide" onclick="sortBy('last_activity')">Last activity</th>
      <th class="hide" onclick="sortBy('created')">Captured</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<div id="ov" onclick="closeDrawer()"></div>
<div id="drawer"></div>

<script>
const API="https://zyrjljjzzijtbksebxcl.supabase.co/functions/v1/cockpit-api";
const STAGES=["new","contacted","qualified","booked","won","lost"];
const INTS=["high","medium","low","unknown"];
const SC={new:"#8a8a8a",contacted:"#0099FF",qualified:"#F5B53D",booked:"#34D399",won:"#22c55e",lost:"#F87171"};
const IC={high:"#34D399",medium:"#F5B53D",low:"#8a8a8a",unknown:"#3a3a3a"};
const WINNER="120249356092960478";
const OPENER=n=>"Hey "+n+", Alex here, founder at Terraflow. You came through our Look Funded ad so I figured I'd reach out directly rather than have a form do it.\n\nQuick one: what are you building right now? If you send me your site or deck I'll tell you straight what's making it read earlier-stage than you actually are, and the two or three things I'd change first.\n\nNo charge, no pitch. Just want to be useful.";
let PW=localStorage.getItem("tf_cockpit_pw")||"";
let LEADS=[], fStage="all", fInt="all", sortKey="last_activity", sortDir=-1, curId=null;

function call(action,extra){ return fetch(API,{method:"POST",headers:{"content-type":"application/json"},
  body:JSON.stringify(Object.assign({password:PW,action},extra||{}))}).then(async r=>{ if(r.status===401) throw "unauthorized"; return r.json(); }); }
function login(){ PW=document.getElementById("pw").value.trim();
  call("leads").then(d=>{localStorage.setItem("tf_cockpit_pw",PW);boot(d);}).catch(()=>{document.getElementById("gerr").textContent="Wrong password.";}); }
function logout(){ localStorage.removeItem("tf_cockpit_pw"); location.reload(); }
function load(){ call("leads").then(boot).catch(openGate); }
function openGate(){ document.getElementById("gate").style.display="flex"; }
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fn(n){ return (n||"there").split(" ")[0]; }

function boot(d){
  if(d.error){ openGate(); return; }
  document.getElementById("gate").style.display="none";
  document.getElementById("bar").style.display="flex";
  document.getElementById("tablewrap").style.display="block";
  LEADS=Array.isArray(d)?d:[];
  chips(); render();
}
function chip(v,cur,cb,col){ const on=v===cur; return '<span class="chip'+(on?" on":"")+'" onclick="'+cb+'(\''+v+'\')" '+(col&&on?'style="background:'+col+';border-color:'+col+'"':'')+'>'+v+'</span>'; }
function chips(){
  document.getElementById("stageChips").innerHTML=["all",...STAGES].map(s=>chip(s,fStage,"setStageF")).join("");
  document.getElementById("intChips").innerHTML=["all",...INTS].map(s=>chip(s,fInt,"setIntF")).join("");
}
function setStageF(v){ fStage=v; chips(); render(); }
function setIntF(v){ fInt=v; chips(); render(); }
function sortBy(k){ if(sortKey===k) sortDir=-sortDir; else {sortKey=k;sortDir=-1;} render(); }

function filtered(){
  const q=(document.getElementById("search").value||"").toLowerCase();
  let a=LEADS.filter(l=>(fStage==="all"||l.stage===fStage)&&(fInt==="all"||l.interest===fInt)
    &&(!q||(l.name||"").toLowerCase().includes(q)||(l.ad||"").toLowerCase().includes(q)));
  a.sort((x,y)=>{ let A=x[sortKey]||"",B=y[sortKey]||""; return (A<B?-1:A>B?1:0)*sortDir; });
  return a;
}
function render(){
  const a=filtered();
  document.getElementById("count").textContent=a.length+" of "+LEADS.length;
  document.getElementById("rows").innerHTML=a.map(l=>{
    const win=l.ad===("TF Look Funded")?"":"";
    return '<tr onclick="openDetail(\''+l.lead_id+'\')" class="'+(l.lead_id===curId?"sel":"")+'">'
      +'<td><div class="nm">'+esc(l.name||"(no name)")+' <span class="sub">•••'+esc(l.last4||"")+'</span></div></td>'
      +'<td class="hide sub">'+esc(l.ad||l.source||"")+'</td>'
      +'<td><span class="pill" style="background:'+SC[l.stage]+'22;color:'+SC[l.stage]+'">'+l.stage+'</span></td>'
      +'<td><span class="pill" style="background:'+IC[l.interest]+'22;color:'+(l.interest==="unknown"?"#8a8a8a":IC[l.interest])+'">'+l.interest+'</span></td>'
      +'<td class="hide">'+(l.replied?'<span class="dot" style="background:#34D399"></span>':'<span class="sub">–</span>')+'</td>'
      +'<td class="hide sub">'+esc(l.last_activity||"")+'</td>'
      +'<td class="hide sub">'+esc((l.created||"").slice(5))+'</td></tr>';
  }).join("");
}

function openDetail(id){
  curId=id; render();
  call("detail",{lead_id:id}).then(d=>{
    if(d.error){alert(d.error);return;}
    const digits=(d.phone||"").replace(/[^0-9]/g,"");
    const wa=digits?("https://wa.me/"+digits+"?text="+encodeURIComponent(OPENER(fn(d.name)))):"";
    const stageSel='<select onchange="act(\'set_stage\',{stage:this.value})">'+STAGES.map(s=>'<option'+(s===d.stage?" selected":"")+'>'+s+'</option>').join("")+'</select>';
    const intSel='<select onchange="act(\'interest\',{interest:this.value})">'+INTS.map(s=>'<option'+(s===d.interest?" selected":"")+'>'+s+'</option>').join("")+'</select>';
    const tl=(d.timeline||[]).map(e=>'<div class="ev"><div class="ty">'+esc(e.type)+(e.channel?' <span class="sub">· '+esc(e.channel)+'</span>':'')+'</div>'+(e.note?'<div class="no">'+esc(e.note)+'</div>':'')+'<div class="wh">'+esc(e.at)+'</div></div>').join("");
    document.getElementById("drawer").innerHTML=
      '<div class="dhead"><div><div class="dname">'+esc(d.name||"(no name)")+'</div>'
        +'<div class="dmeta">'+esc(d.ad||d.source||"")+' · '+esc(d.created||"")+'</div></div>'
        +'<div class="x" onclick="closeDrawer()">✕</div></div>'
      +'<div class="actions">'+(wa?'<a class="wa" href="'+wa+'" target="_blank">WhatsApp</a>':'')
        +(d.email?'<a class="em" href="mailto:'+esc(d.email)+'">Email</a>':'')+'</div>'
      +'<div class="contact"><span class="cp" onclick="copy(\''+esc(d.phone||"")+'\')">copy</span>📱 '+esc(d.phone||"—")+'<br>'
        +'<span class="cp" onclick="copy(\''+esc(d.email||"")+'\')">copy</span>✉️ '+esc(d.email||"—")+'</div>'
      +'<div class="field"><label>Stage</label>'+stageSel+'</div>'
      +'<div class="field"><label>Interest</label>'+intSel+'</div>'
      +'<div class="field"><label>Add note</label><textarea id="note" rows="2" placeholder="What happened…"></textarea>'
        +'<button class="savebtn" onclick="saveNote()">Save note</button></div>'
      +'<div class="field"><label>Activity</label><div class="tl">'+(tl||'<div class="sub">No activity yet.</div>')+'</div></div>';
    document.getElementById("drawer").classList.add("open");
    document.getElementById("ov").style.display="block";
  });
}
function closeDrawer(){ document.getElementById("drawer").classList.remove("open"); document.getElementById("ov").style.display="none"; curId=null; render(); }
function act(action,extra){ call(action,Object.assign({lead_id:curId},extra)).then(()=>{ load(); openDetail(curId); }); }
function saveNote(){ const t=document.getElementById("note").value.trim(); if(!t)return; call("note",{lead_id:curId,note:t}).then(()=>{ load(); openDetail(curId); }); }
function copy(t){ navigator.clipboard&&navigator.clipboard.writeText(t); }

if(PW){ load(); } else { openGate(); }
document.getElementById("pw").addEventListener("keydown",e=>{ if(e.key==="Enter") login(); });
</script>
</body></html>
